<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>📄 Markdown Viewer</title>
    <!-- Load Marked.js for rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f7fb;
            color: #1a1a2e;
            line-height: 1.7;
        }
        .container {
            background: white;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1, h2, h3 { color: #1a1a2e; }
        h1 { border-bottom: 3px solid #4a00e0; padding-bottom: 10px; }
        h2 { border-bottom: 2px solid #e8ecf4; padding-bottom: 8px; margin-top: 30px; }
        code { background: #f0f4fe; padding: 2px 8px; border-radius: 4px; font-size: 0.9em; }
        pre { background: #1a1a2e; color: #e8ecf4; padding: 16px 20px; border-radius: 10px; overflow-x: auto; }
        blockquote { border-left: 4px solid #4a00e0; margin: 20px 0; padding-left: 20px; color: #4a5a6e; }
        table { border-collapse: collapse; width: 100%; margin: 16px 0; }
        th, td { border: 1px solid #dce2ec; padding: 10px 14px; text-align: left; }
        th { background: #f0f4fe; }
        a { color: #4a00e0; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .back-btn {
            display: inline-block;
            background: #4a00e0;
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .back-btn:hover { background: #3a00b0; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">⬅ Back to Course</a>
        <div id="content">Loading...</div>
    </div>

    <script>
        // Get filename from URL
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');

        if (!file) {
            document.getElementById('content').innerHTML = '<h2>❌ No file specified</h2><p>Please provide a ?file= parameter.</p>';
        } else {
            fetch(file)
                .then(response => {
                    if (!response.ok) throw new Error('File not found (404)');
                    return response.text();
                })
                .then(markdown => {
                    document.getElementById('content').innerHTML = marked.parse(markdown);
                })
                .catch(error => {
                    document.getElementById('content').innerHTML = `
                        <h2>❌ Error Loading File</h2>
                        <p><strong>${error.message}</strong></p>
                        <p>File: <code>${file}</code></p>
                        <p>Make sure the file exists and is accessible.</p>
                    `;
                });
        }
    </script>
</body>
</html>

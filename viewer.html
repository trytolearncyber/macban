<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>📄 Markdown Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ── CSS Variables for Dark/Light Mode ── */
        :root {
            --bg-body: #f5f7fb;
            --bg-container: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a5a6e;
            --border-color: #e8ecf4;
            --code-bg: #f0f4fe;
            --pre-bg: #1a1a2e;
            --pre-text: #e8ecf4;
            --blockquote-border: #4a00e0;
            --table-header: #f0f4fe;
            --table-border: #dce2ec;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --link-color: #4a00e0;
            --btn-bg: #4a00e0;
            --btn-hover: #3a00b0;
            --error-bg: #ffe8e8;
            --error-text: #d63031;
            --loading-color: #5a6a7e;
            --success-color: #0a7a3a;
            --lang-btn-bg: #2d3436;
            --lang-btn-text: white;
        }

        [data-theme="dark"] {
            --bg-body: #0d1117;
            --bg-container: #161b22;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --code-bg: #1c2333;
            --pre-bg: #0d1117;
            --pre-text: #e6edf3;
            --blockquote-border: #58a6ff;
            --table-header: #21262d;
            --table-border: #30363d;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --link-color: #58a6ff;
            --btn-bg: #238636;
            --btn-hover: #2ea043;
            --error-bg: #2d1b1e;
            --error-text: #f85149;
            --loading-color: #8b949e;
            --success-color: #3fb950;
            --lang-btn-bg: #21262d;
            --lang-btn-text: #e6edf3;
        }

        /* ── Base Styles ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.7;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            background: var(--bg-container);
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        /* ── Header ── */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
        }

        .header-left {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .back-btn {
            display: inline-block;
            background: var(--btn-bg);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .back-btn:hover { background: var(--btn-hover); text-decoration: none; }

        .lang-btn {
            background: var(--lang-btn-bg);
            color: var(--lang-btn-text);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .lang-btn:hover {
            opacity: 0.85;
        }
        .lang-btn.active {
            background: var(--btn-bg);
            color: white;
            border-color: var(--btn-bg);
        }

        .dark-toggle {
            background: var(--border-color);
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-primary);
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .dark-toggle:hover { background: var(--table-header); }

        /* ── Translation Progress ── */
        .translation-progress {
            display: none;
            background: var(--code-bg);
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid var(--btn-bg);
            font-weight: 500;
        }
        .translation-progress.show {
            display: block;
        }

        .translation-notice {
            background: var(--code-bg);
            padding: 10px 16px;
            border-radius: 8px;
            border-left: 4px solid var(--blockquote-border);
            margin-bottom: 20px;
            font-style: italic;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* ── CONTENT STYLES ── */
        #content {
            min-height: 300px;
        }

        #content h1, #content h2, #content h3, #content h4, #content h5, #content h6 {
            color: var(--text-primary);
            margin-top: 1.8em;
            margin-bottom: 0.6em;
            line-height: 1.3;
        }
        #content h1 { font-size: 2.2em; border-bottom: 3px solid var(--blockquote-border); padding-bottom: 10px; margin-top: 0; }
        #content h2 { font-size: 1.8em; border-bottom: 2px solid var(--border-color); padding-bottom: 8px; }
        #content h3 { font-size: 1.4em; }
        #content h4 { font-size: 1.2em; }
        #content h5, #content h6 { font-size: 1.1em; }

        #content p {
            color: var(--text-primary);
            margin-bottom: 1.2em;
            line-height: 1.8;
        }

        #content ul, #content ol {
            margin: 0.8em 0 1.2em 1.8em;
            padding-left: 0.5em;
        }
        #content li {
            margin-bottom: 0.3em;
            line-height: 1.7;
        }
        #content li:last-child { margin-bottom: 0; }

        #content code {
            background: var(--code-bg);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.9em;
            color: var(--text-primary);
        }
        #content pre {
            background: var(--pre-bg);
            color: var(--pre-text);
            padding: 16px 20px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 1.2em 0;
        }
        #content pre code {
            background: transparent;
            padding: 0;
        }

        #content blockquote {
            border-left: 4px solid var(--blockquote-border);
            margin: 1.2em 0;
            padding-left: 20px;
            color: var(--text-secondary);
        }

        #content table {
            border-collapse: collapse;
            width: 100%;
            margin: 1.2em 0;
        }
        #content th, #content td {
            border: 1px solid var(--table-border);
            padding: 10px 14px;
            text-align: left;
            vertical-align: top;
        }
        #content th {
            background: var(--table-header);
            color: var(--text-primary);
            font-weight: 600;
        }
        #content td { color: var(--text-primary); }

        #content a {
            color: var(--link-color);
            text-decoration: none;
        }
        #content a:hover { text-decoration: underline; }

        #content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 1.8em 0;
        }

        #content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1em 0;
        }

        /* ── Utility ── */
        .loading {
            text-align: center;
            padding: 40px 0;
            color: var(--loading-color);
        }

        .error {
            color: var(--error-text);
            background: var(--error-bg);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--error-text);
        }
        .error code { background: var(--bg-container); }

        .footer-info {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 20px;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            body { padding: 10px; margin: 10px auto; }
            .container { padding: 20px; }
            .header-bar { flex-direction: column; align-items: stretch; }
            .header-left { flex-direction: column; align-items: stretch; }
            .back-btn, .lang-btn, .dark-toggle { justify-content: center; width: 100%; }
            #content table { font-size: 0.85rem; }
            #content th, #content td { padding: 6px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <div class="header-left">
                <a href="index.html" class="back-btn">⬅ Back to Course</a>
                <button class="lang-btn" id="langToggle" onclick="toggleLanguage()">
                    🌐 Translate to English
                </button>
            </div>
            <button class="dark-toggle" id="darkToggle" onclick="toggleDarkMode()">
                🌙 Dark Mode
            </button>
        </div>

        <div id="translationProgress" class="translation-progress">
            🔄 Translating to English... Please wait...
        </div>

        <div id="content">
            <div class="loading">📖 Loading document...</div>
        </div>
    </div>

    <script>
        // ── Dark Mode ──
        function toggleDarkMode() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const btn = document.getElementById('darkToggle');
            
            if (current === 'dark') {
                html.removeAttribute('data-theme');
                btn.innerHTML = '🌙 Dark Mode';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                btn.innerHTML = '☀️ Light Mode';
                localStorage.setItem('theme', 'dark');
            }
        }

        (function loadTheme() {
            const saved = localStorage.getItem('theme');
            const btn = document.getElementById('darkToggle');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                if (btn) btn.innerHTML = '☀️ Light Mode';
            }
        })();

        // ── Language Toggle ──
        let currentLanguage = 'original';
        let originalHTML = '';
        let translatedHTML = '';
        let isTranslating = false;

        function toggleLanguage() {
            if (isTranslating) return;

            const btn = document.getElementById('langToggle');
            const contentDiv = document.getElementById('content');
            
            if (currentLanguage === 'original') {
                // Switch to English
                if (translatedHTML) {
                    // Already translated, just switch
                    currentLanguage = 'english';
                    btn.innerHTML = '🔄 Original';
                    btn.classList.add('active');
                    contentDiv.innerHTML = translatedHTML;
                    addTranslationNotice('🌐 Displaying in English (Google Translated)');
                } else {
                    // Need to translate
                    translateContent();
                }
            } else {
                // Switch to Original
                currentLanguage = 'original';
                btn.innerHTML = '🌐 Translate to English';
                btn.classList.remove('active');
                if (originalHTML) {
                    contentDiv.innerHTML = originalHTML;
                }
                removeTranslationNotice();
            }
            
            localStorage.setItem('language', currentLanguage);
        }

        function addTranslationNotice(text) {
            removeTranslationNotice();
            const contentDiv = document.getElementById('content');
            const notice = document.createElement('div');
            notice.className = 'translation-notice';
            notice.id = 'translationNotice';
            notice.textContent = text;
            if (contentDiv.firstChild) {
                contentDiv.insertBefore(notice, contentDiv.firstChild);
            } else {
                contentDiv.appendChild(notice);
            }
        }

        function removeTranslationNotice() {
            const existing = document.getElementById('translationNotice');
            if (existing) existing.remove();
        }

        // ── Full Translation using Google Translate API ──
        async function translateContent() {
            const contentDiv = document.getElementById('content');
            const progressDiv = document.getElementById('translationProgress');
            const btn = document.getElementById('langToggle');
            
            if (isTranslating) return;
            isTranslating = true;
            
            // Save original if not saved
            if (!originalHTML) {
                originalHTML = contentDiv.innerHTML;
            }

            // Show progress
            progressDiv.classList.add('show');
            progressDiv.textContent = '🔄 Translating to English... Please wait...';
            btn.disabled = true;

            try {
                // Get all text nodes from the content
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = originalHTML;
                
                // Remove footer and notices
                const footer = tempDiv.querySelector('.footer-info');
                if (footer) footer.remove();
                const notice = tempDiv.querySelector('.translation-notice');
                if (notice) notice.remove();

                // Collect all text nodes that need translation
                const textNodes = [];
                const walker = document.createTreeWalker(
                    tempDiv,
                    NodeFilter.SHOW_TEXT,
                    {
                        acceptNode: function(node) {
                            let parent = node.parentElement;
                            while (parent) {
                                if (parent.tagName === 'SCRIPT' || parent.tagName === 'STYLE' || 
                                    parent.tagName === 'CODE' || parent.tagName === 'PRE') {
                                    return NodeFilter.FILTER_REJECT;
                                }
                                parent = parent.parentElement;
                            }
                            if (node.textContent.trim().length === 0) {
                                return NodeFilter.FILTER_REJECT;
                            }
                            return NodeFilter.FILTER_ACCEPT;
                        }
                    }
                );

                let node;
                const nodesToTranslate = [];
                while (node = walker.nextNode()) {
                    nodesToTranslate.push(node);
                }

                // Translate in batches (to avoid rate limiting)
                const batchSize = 20;
                let translatedCount = 0;
                const totalNodes = nodesToTranslate.length;

                for (let i = 0; i < nodesToTranslate.length; i += batchSize) {
                    const batch = nodesToTranslate.slice(i, i + batchSize);
                    
                    // Translate each node in batch
                    const promises = batch.map(async (node, index) => {
                        const originalText = node.textContent;
                        try {
                            const translated = await translateText(originalText);
                            node.textContent = translated;
                        } catch (e) {
                            console.warn('Failed to translate:', originalText);
                            // Keep original if translation fails
                        }
                    });

                    await Promise.all(promises);
                    
                    translatedCount += batch.length;
                    progressDiv.textContent = `🔄 Translating... ${Math.round((translatedCount / totalNodes) * 100)}%`;
                }

                translatedHTML = tempDiv.innerHTML;
                
                // Display translated content
                contentDiv.innerHTML = translatedHTML;
                currentLanguage = 'english';
                btn.innerHTML = '🔄 Original';
                btn.classList.add('active');
                addTranslationNotice('🌐 Displaying in English (Google Translated)');
                
                progressDiv.textContent = '✅ Translation complete!';
                setTimeout(() => {
                    progressDiv.classList.remove('show');
                }, 2000);

            } catch (error) {
                console.error('Translation error:', error);
                progressDiv.textContent = '❌ Translation failed. Please try again.';
                setTimeout(() => {
                    progressDiv.classList.remove('show');
                }, 3000);
            } finally {
                isTranslating = false;
                btn.disabled = false;
            }
        }

        // ── Google Translate API (Free, No API Key Required) ──
        async function translateText(text) {
            try {
                // Detect if text is already in English (simple check)
                const englishPattern = /^[a-zA-Z0-9\s\.,!?'"()-]+$/;
                if (englishPattern.test(text.trim())) {
                    return text; // Already English
                }

                // Use Google Translate API (unofficial, free)
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                // Parse the translation
                if (data && data[0]) {
                    let translated = '';
                    for (const part of data[0]) {
                        if (part[0]) {
                            translated += part[0];
                        }
                    }
                    return translated || text;
                }
                return text;
            } catch (error) {
                console.warn('Translate API error:', error);
                return text;
            }
        }

        // ── Main Markdown Loader ──
        const params = new URLSearchParams(window.location.search);
        let file = params.get('file');

        if (!file) {
            document.getElementById('content').innerHTML = `
                <h2>❌ No file specified</h2>
                <p>Please use: <code>?file=path/to/file.md</code></p>
            `;
        } else {
            file = file.replace(/^\//, '');
            
            const GITHUB_USER = 'trytolearncyber';
            const GITHUB_REPO = 'macban';
            const BRANCH = 'main';
            
            const rawUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${file}`;
            const pagesUrl = window.location.origin + '/' + file;
            
            console.log('Fetching from:', rawUrl);
            
            fetch(rawUrl)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.text();
                })
                .then(markdown => {
                    if (markdown.trim().startsWith('<!DOCTYPE') || markdown.trim().startsWith('<html')) {
                        throw new Error('File appears to be HTML, not markdown');
                    }
                    const parsedHTML = marked.parse(markdown);
                    originalHTML = parsedHTML + `
                        <hr>
                        <p class="footer-info">
                            ✅ Loaded from: <a href="${rawUrl}" target="_blank">GitHub Raw</a>
                        </p>
                    `;
                    document.getElementById('content').innerHTML = originalHTML;
                    
                    // Restore language preference
                    const savedLang = localStorage.getItem('language');
                    if (savedLang === 'english') {
                        // Auto-translate after loading
                        setTimeout(() => {
                            translateContent();
                        }, 500);
                    }
                })
                .catch(error => {
                    console.log('Raw failed, trying Pages:', pagesUrl);
                    fetch(pagesUrl)
                        .then(response => {
                            if (!response.ok) throw new Error(`HTTP ${response.status}`);
                            return response.text();
                        })
                        .then(markdown => {
                            if (markdown.trim().startsWith('<!DOCTYPE') || markdown.trim().startsWith('<html')) {
                                throw new Error('File appears to be HTML, not markdown');
                            }
                            const parsedHTML = marked.parse(markdown);
                            originalHTML = parsedHTML + `
                                <hr>
                                <p class="footer-info">
                                    ✅ Loaded from: <a href="${pagesUrl}" target="_blank">GitHub Pages</a>
                                </p>
                            `;
                            document.getElementById('content').innerHTML = originalHTML;
                            
                            // Restore language preference
                            const savedLang = localStorage.getItem('language');
                            if (savedLang === 'english') {
                                setTimeout(() => {
                                    translateContent();
                                }, 500);
                            }
                        })
                        .catch(finalError => {
                            document.getElementById('content').innerHTML = `
                                <div class="error">
                                    <h2>❌ Error Loading File</h2>
                                    <p><strong>${finalError.message}</strong></p>
                                    <p><strong>File path:</strong> <code>${file}</code></p>
                                    <hr>
                                    <p><strong>💡 Try these links:</strong></p>
                                    <p>
                                        <a href="${rawUrl}" target="_blank">📄 View Raw on GitHub</a><br>
                                        <a href="https://github.com/${GITHUB_USER}/${GITHUB_REPO}/blob/${BRANCH}/${file}" target="_blank">📖 View on GitHub</a>
                                    </p>
                                </div>
                            `;
                        });
                });
        }
    </script>
</body>
</html>

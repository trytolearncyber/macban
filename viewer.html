<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MACBan Documentation</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>

<style>

body{
    margin:0;
    background:#f6f8fa;
    font-family:Segoe UI,Arial,sans-serif;
}

header{

    background:#24292f;
    color:white;
    padding:15px 25px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

header a{

    color:white;
    text-decoration:none;
    font-weight:bold;
}

main{

    max-width:1100px;
    margin:40px auto;
    background:white;

    padding:40px;

    border-radius:12px;

    box-shadow:0 2px 12px rgba(0,0,0,.08);

}

img{

max-width:100%;

}

pre{

border-radius:8px;

}

</style>

</head>

<body>

<header>

<div>

🏦 <strong>MACBan Documentation</strong>

</div>

<div>

<a href="index.html">← Home</a>

</div>

</header>

<main>

<article class="markdown-body" id="content">

Loading...

</article>

</main>

<script>

const params=new URLSearchParams(location.search);

const file=params.get("file");

if(!file){

document.getElementById("content").innerHTML="<h2>No file selected.</h2>";

}else{

fetch(decodeURIComponent(file))

.then(r=>{

if(!r.ok) throw new Error();

return r.text();

})

.then(md=>{

marked.setOptions({

highlight:function(code,lang){

if(lang && hljs.getLanguage(lang)){

return hljs.highlight(code,{language:lang}).value;

}

return hljs.highlightAuto(code).value;

}

});

document.getElementById("content").innerHTML=marked.parse(md);

document.querySelectorAll("pre code").forEach(el=>hljs.highlightElement(el));

})

.catch(()=>{

document.getElementById("content").innerHTML="<h2>Unable to load markdown file.</h2>";

});

}

</script>

</body>
</html>

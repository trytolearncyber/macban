<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>📄 Markdown Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f7fb;
            color: #1a1a2e;
            line-height: 1.7;
        }
        .container {
            background: white;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            min-height: 400px;
        }
        h1, h2, h3 { color: #1a1a2e; }
        h1 { border-bottom: 3px solid #4a00e0; padding-bottom: 10px; }
        h2 { border-bottom: 2px solid #e8ecf4; padding-bottom: 8px; margin-top: 30px; }
        code { background: #f0f4fe; padding: 2px 8px; border-radius: 4px; font-size: 0.9em; }
        pre { background: #1a1a2e; color: #e8ecf4; padding: 16px 20px; border-radius: 10px; overflow-x: auto; }
        blockquote { border-left: 4px solid #4a00e0; margin: 20px 0; padding-left: 20px; color: #4a5a6e; }
        table { border-collapse: collapse; width: 100%; margin: 16px 0; }
        th, td { border: 1px solid #dce2ec; padding: 10px 14px; text-align: left; }
        th { background: #f0f4fe; }
        a { color: #4a00e0; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .back-btn {
            display: inline-block;
            background: #4a00e0;
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .back-btn:hover { background: #3a00b0; text-decoration: none; }
        .loading { text-align: center; padding: 40px 0; color: #5a6a7e; }
        .error { color: #d63031; background: #ffe8e8; padding: 20px; border-radius: 10px; border-left: 4px solid #d63031; }
        .error code { background: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">⬅ Back to Course</a>
        <div id="content">
            <div class="loading">📖 Loading document...</div>
        </div>
    </div>

    <script>
        // Get filename from URL
        const params = new URLSearchParams(window.location.search);
        let file = params.get('file');

        if (!file) {
            document.getElementById('content').innerHTML = `
                <h2>❌ No file specified</h2>
                <p>Please use: <code>?file=path/to/file.md</code></p>
            `;
        } else {
            // Fix: Remove any leading slashes
            file = file.replace(/^\//, '');
            
            // Try to fetch with absolute path from root
            const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/');
            const fullUrl = baseUrl + file;
            
            console.log('Fetching:', fullUrl);
            
            fetch(fullUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.text();
                })
                .then(markdown => {
                    // Check if it's actually markdown or HTML
                    if (markdown.trim().startsWith('<!DOCTYPE')) {
                        throw new Error('File appears to be HTML, not markdown');
                    }
                    document.getElementById('content').innerHTML = marked.parse(markdown);
                })
                .catch(error => {
                    document.getElementById('content').innerHTML = `
                        <div class="error">
                            <h2>❌ Error Loading File</h2>
                            <p><strong>${error.message}</strong></p>
                            <p><strong>File path:</strong> <code>${file}</code></p>
                            <p><strong>Full URL:</strong> <code>${fullUrl}</code></p>
                            <hr>
                            <p><strong>💡 Possible fixes:</strong></p>
                            <ul>
                                <li>Make sure the file exists in your repository</li>
                                <li>Check that the file is in the correct folder</li>
                                <li>Wait 2-3 minutes after pushing changes</li>
                                <li>Try the direct GitHub link instead</li>
                            </ul>
                        </div>
                    `;
                });
        }
    </script>
</body>
</html>

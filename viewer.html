<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>📄 Markdown Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ── CSS Variables for Dark/Light Mode ── */
        :root {
            --bg-body: #f5f7fb;
            --bg-container: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a5a6e;
            --border-color: #e8ecf4;
            --code-bg: #f0f4fe;
            --pre-bg: #1a1a2e;
            --pre-text: #e8ecf4;
            --blockquote-border: #4a00e0;
            --table-header: #f0f4fe;
            --table-border: #dce2ec;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --link-color: #4a00e0;
            --btn-bg: #4a00e0;
            --btn-hover: #3a00b0;
            --error-bg: #ffe8e8;
            --error-text: #d63031;
            --loading-color: #5a6a7e;
            --success-color: #0a7a3a;
            --lang-btn-bg: #2d3436;
            --lang-btn-text: white;
        }

        [data-theme="dark"] {
            --bg-body: #0d1117;
            --bg-container: #161b22;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --code-bg: #1c2333;
            --pre-bg: #0d1117;
            --pre-text: #e6edf3;
            --blockquote-border: #58a6ff;
            --table-header: #21262d;
            --table-border: #30363d;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --link-color: #58a6ff;
            --btn-bg: #238636;
            --btn-hover: #2ea043;
            --error-bg: #2d1b1e;
            --error-text: #f85149;
            --loading-color: #8b949e;
            --success-color: #3fb950;
            --lang-btn-bg: #21262d;
            --lang-btn-text: #e6edf3;
        }

        /* ── Base Styles ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1000px;
            margin: 20px auto;
            padding: 15px;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.7;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            background: var(--bg-container);
            padding: 25px 35px;
            border-radius: 14px;
            box-shadow: var(--shadow);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        /* ── Header with Small Buttons ── */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }

        .header-left {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.75rem;
            transition: background 0.2s, transform 0.15s;
            border: 1px solid transparent;
            cursor: pointer;
            white-space: nowrap;
            background: var(--btn-bg);
            color: white;
            line-height: 1.4;
        }
        .btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }
        .btn:active {
            transform: translateY(0);
        }

        .btn-back {
            background: var(--btn-bg);
            color: white;
        }
        .btn-back:hover { background: var(--btn-hover); }

        .btn-lang {
            background: var(--lang-btn-bg);
            color: var(--lang-btn-text);
            border-color: var(--border-color);
        }
        .btn-lang:hover { opacity: 0.85; }
        .btn-lang.active {
            background: var(--btn-bg);
            color: white;
            border-color: var(--btn-bg);
        }

        .btn-dark {
            background: var(--border-color);
            color: var(--text-primary);
            border-color: var(--border-color);
        }
        .btn-dark:hover { background: var(--table-header); }

        /* ── Bottom Back Button ── */
        .bottom-back {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
        }

        /* ── Translation Progress ── */
        .translation-progress {
            display: none;
            background: var(--code-bg);
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 4px solid var(--btn-bg);
            font-weight: 500;
            font-size: 0.9rem;
        }
        .translation-progress.show {
            display: block;
        }

        .translation-notice {
            background: var(--code-bg);
            padding: 8px 14px;
            border-radius: 6px;
            border-left: 4px solid var(--blockquote-border);
            margin-bottom: 16px;
            font-style: italic;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* ── CONTENT STYLES ── */
        #content {
            min-height: 250px;
        }

        #content h1, #content h2, #content h3, #content h4, #content h5, #content h6 {
            color: var(--text-primary);
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            line-height: 1.3;
        }
        #content h1 { font-size: 2em; border-bottom: 3px solid var(--blockquote-border); padding-bottom: 8px; margin-top: 0; }
        #content h2 { font-size: 1.6em; border-bottom: 2px solid var(--border-color); padding-bottom: 6px; }
        #content h3 { font-size: 1.3em; }
        #content h4 { font-size: 1.1em; }
        #content h5, #content h6 { font-size: 1em; }

        #content p {
            color: var(--text-primary);
            margin-bottom: 1em;
            line-height: 1.8;
        }

        #content ul, #content ol {
            margin: 0.6em 0 1em 1.6em;
            padding-left: 0.5em;
        }
        #content li {
            margin-bottom: 0.2em;
            line-height: 1.7;
        }
        #content li:last-child { margin-bottom: 0; }

        #content code {
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            color: var(--text-primary);
        }
        #content pre {
            background: var(--pre-bg);
            color: var(--pre-text);
            padding: 14px 18px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1em 0;
        }
        #content pre code {
            background: transparent;
            padding: 0;
        }

        #content blockquote {
            border-left: 4px solid var(--blockquote-border);
            margin: 1em 0;
            padding-left: 16px;
            color: var(--text-secondary);
        }

        #content table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
        }
        #content th, #content td {
            border: 1px solid var(--table-border);
            padding: 8px 12px;
            text-align: left;
            vertical-align: top;
        }
        #content th {
            background: var(--table-header);
            color: var(--text-primary);
            font-weight: 600;
        }
        #content td { color: var(--text-primary); }

        #content a {
            color: var(--link-color);
            text-decoration: none;
        }
        #content a:hover { text-decoration: underline; }

        #content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 1.5em 0;
        }

        #content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 0.8em 0;
        }

        /* ── Utility ── */
        .loading {
            text-align: center;
            padding: 30px 0;
            color: var(--loading-color);
            font-size: 0.95rem;
        }

        .error {
            color: var(--error-text);
            background: var(--error-bg);
            padding: 16px 20px;
            border-radius: 8px;
            border-left: 4px solid var(--error-text);
        }
        .error code { background: var(--bg-container); }

        .footer-info {
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-align: center;
            margin-top: 16px;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            body { padding: 8px; margin: 5px auto; }
            .container { padding: 15px; }
            .header-bar { flex-direction: column; align-items: stretch; }
            .header-left { flex-direction: column; align-items: stretch; }
            .btn { justify-content: center; width: 100%; font-size: 0.7rem; padding: 4px 10px; }
            #content table { font-size: 0.8rem; }
            #content th, #content td { padding: 4px 6px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <div class="header-left">
                <a href="index.html" class="btn btn-back">⬅ Back</a>
                <button class="btn btn-lang" id="langToggle" onclick="toggleLanguage()">🌐 Translate</button>
            </div>
            <button class="btn btn-dark" id="darkToggle" onclick="toggleDarkMode()">🌙 Dark</button>
        </div>

        <div id="translationProgress" class="translation-progress">
            🔄 Translating... Please wait...
        </div>

        <div id="content">
            <div class="loading">📖 Loading document...</div>
        </div>

        <!-- Bottom Back Button -->
        <div class="bottom-back">
            <a href="index.html" class="btn btn-back">⬅ Back to Course</a>
        </div>
    </div>

    <script>
        // ── Dark Mode ──
        function toggleDarkMode() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const btn = document.getElementById('darkToggle');
            
            if (current === 'dark') {
                html.removeAttribute('data-theme');
                btn.innerHTML = '🌙 Dark';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                btn.innerHTML = '☀️ Light';
                localStorage.setItem('theme', 'dark');
            }
        }

        (function loadTheme() {
            const saved = localStorage.getItem('theme');
            const btn = document.getElementById('darkToggle');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                if (btn) btn.innerHTML = '☀️ Light';
            }
        })();

        // ── Language Toggle ──
        let currentLanguage = 'original';
        let originalHTML = '';
        let translatedHTML = '';
        let isTranslating = false;

        function toggleLanguage() {
            if (isTranslating) return;

            const btn = document.getElementById('langToggle');
            const contentDiv = document.getElementById('content');
            
            if (currentLanguage === 'original') {
                if (translatedHTML) {
                    currentLanguage = 'english';
                    btn.innerHTML = '🔄 Original';
                    btn.classList.add('active');
                    contentDiv.innerHTML = translatedHTML;
                    addTranslationNotice('🌐 Displaying in English');
                } else {
                    translateContent();
                }
            } else {
                currentLanguage = 'original';
                btn.innerHTML = '🌐 Translate';
                btn.classList.remove('active');
                if (originalHTML) {
                    contentDiv.innerHTML = originalHTML;
                }
                removeTranslationNotice();
            }
            
            localStorage.setItem('language', currentLanguage);
        }

        function addTranslationNotice(text) {
            removeTranslationNotice();
            const contentDiv = document.getElementById('content');
            const notice = document.createElement('div');
            notice.className = 'translation-notice';
            notice.id = 'translationNotice';
            notice.textContent = text;
            if (contentDiv.firstChild) {
                contentDiv.insertBefore(notice, contentDiv.firstChild);
            } else {
                contentDiv.appendChild(notice);
            }
        }

        function removeTranslationNotice() {
            const existing = document.getElementById('translationNotice');
            if (existing) existing.remove();
        }

        // ── FAST TRANSLATION - Only translate visible text ──
        async function translateContent() {
            const contentDiv = document.getElementById('content');
            const progressDiv = document.getElementById('translationProgress');
            const btn = document.getElementById('langToggle');
            
            if (isTranslating) return;
            isTranslating = true;
            
            if (!originalHTML) {
                originalHTML = contentDiv.innerHTML;
            }

            progressDiv.classList.add('show');
            progressDiv.textContent = '🔄 Translating...';
            btn.disabled = true;

            try {
                // Create a temporary container
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = originalHTML;
                
                // Remove footer and notice
                const footer = tempDiv.querySelector('.footer-info');
                if (footer) footer.remove();
                const notice = tempDiv.querySelector('.translation-notice');
                if (notice) notice.remove();

                // Get all text nodes (but skip code, pre, script, style)
                const nodesToTranslate = [];
                const walker = document.createTreeWalker(
                    tempDiv,
                    NodeFilter.SHOW_TEXT,
                    {
                        acceptNode: function(node) {
                            let parent = node.parentElement;
                            while (parent) {
                                if (parent.tagName === 'SCRIPT' || parent.tagName === 'STYLE' || 
                                    parent.tagName === 'CODE' || parent.tagName === 'PRE') {
                                    return NodeFilter.FILTER_REJECT;
                                }
                                parent = parent.parentElement;
                            }
                            const text = node.textContent.trim();
                            if (text.length === 0 || text.length < 3) {
                                return NodeFilter.FILTER_REJECT;
                            }
                            // Skip if already English
                            if (/^[a-zA-Z0-9\s\.,!?'"()\-]+$/.test(text)) {
                                return NodeFilter.FILTER_REJECT;
                            }
                            return NodeFilter.FILTER_ACCEPT;
                        }
                    }
                );

                let node;
                while (node = walker.nextNode()) {
                    nodesToTranslate.push(node);
                }

                const totalNodes = nodesToTranslate.length;
                
                if (totalNodes === 0) {
                    // No translation needed
                    translatedHTML = tempDiv.innerHTML;
                    currentLanguage = 'english';
                    btn.innerHTML = '🔄 Original';
                    btn.classList.add('active');
                    contentDiv.innerHTML = translatedHTML;
                    addTranslationNotice('🌐 All content is already in English');
                    progressDiv.classList.remove('show');
                    isTranslating = false;
                    btn.disabled = false;
                    return;
                }

                // Translate in larger batches (faster)
                const batchSize = 50;
                let translatedCount = 0;

                for (let i = 0; i < nodesToTranslate.length; i += batchSize) {
                    const batch = nodesToTranslate.slice(i, i + batchSize);
                    
                    // Translate all in batch using Promise.all
                    const promises = batch.map(async (node) => {
                        const originalText = node.textContent;
                        try {
                            const translated = await translateText(originalText);
                            node.textContent = translated;
                        } catch (e) {
                            // Keep original if fails
                        }
                    });

                    await Promise.all(promises);
                    
                    translatedCount += batch.length;
                    const percent = Math.round((translatedCount / totalNodes) * 100);
                    progressDiv.textContent = `🔄 Translating... ${percent}%`;
                }

                translatedHTML = tempDiv.innerHTML;
                
                // Display translated content
                contentDiv.innerHTML = translatedHTML;
                currentLanguage = 'english';
                btn.innerHTML = '🔄 Original';
                btn.classList.add('active');
                addTranslationNotice('🌐 Displaying in English');
                
                progressDiv.textContent = '✅ Done!';
                setTimeout(() => {
                    progressDiv.classList.remove('show');
                }, 1500);

            } catch (error) {
                console.error('Translation error:', error);
                progressDiv.textContent = '❌ Failed. Try again.';
                setTimeout(() => {
                    progressDiv.classList.remove('show');
                }, 2000);
            } finally {
                isTranslating = false;
                btn.disabled = false;
            }
        }

        // ── Fast Google Translate API ──
        async function translateText(text) {
            try {
                // Skip if already English
                if (/^[a-zA-Z0-9\s\.,!?'"()\-]+$/.test(text.trim())) {
                    return text;
                }

                // Use Google Translate API
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                if (data && data[0]) {
                    let translated = '';
                    for (const part of data[0]) {
                        if (part[0]) {
                            translated += part[0];
                        }
                    }
                    return translated || text;
                }
                return text;
            } catch (error) {
                console.warn('Translate error:', error);
                return text;
            }
        }

        // ── Main Markdown Loader ──
        const params = new URLSearchParams(window.location.search);
        let file = params.get('file');

        if (!file) {
            document.getElementById('content').innerHTML = `
                <h2>❌ No file specified</h2>
                <p>Please use: <code>?file=path/to/file.md</code></p>
            `;
        } else {
            file = file.replace(/^\//, '');
            
            const GITHUB_USER = 'trytolearncyber';
            const GITHUB_REPO = 'macban';
            const BRANCH = 'main';
            
            const rawUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${file}`;
            const pagesUrl = window.location.origin + '/' + file;
            
            console.log('Fetching from:', rawUrl);
            
            fetch(rawUrl)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.text();
                })
                .then(markdown => {
                    if (markdown.trim().startsWith('<!DOCTYPE') || markdown.trim().startsWith('<html')) {
                        throw new Error('File appears to be HTML, not markdown');
                    }
                    const parsedHTML = marked.parse(markdown);
                    originalHTML = parsedHTML + `
                        <hr>
                        <p class="footer-info">
                            ✅ Loaded from: <a href="${rawUrl}" target="_blank">GitHub Raw</a>
                        </p>
                    `;
                    document.getElementById('content').innerHTML = originalHTML;
                    
                    const savedLang = localStorage.getItem('language');
                    if (savedLang === 'english') {
                        setTimeout(() => {
                            translateContent();
                        }, 300);
                    }
                })
                .catch(error => {
                    console.log('Raw failed, trying Pages:', pagesUrl);
                    fetch(pagesUrl)
                        .then(response => {
                            if (!response.ok) throw new Error(`HTTP ${response.status}`);
                            return response.text();
                        })
                        .then(markdown => {
                            if (markdown.trim().startsWith('<!DOCTYPE') || markdown.trim().startsWith('<html')) {
                                throw new Error('File appears to be HTML, not markdown');
                            }
                            const parsedHTML = marked.parse(markdown);
                            originalHTML = parsedHTML + `
                                <hr>
                                <p class="footer-info">
                                    ✅ Loaded from: <a href="${pagesUrl}" target="_blank">GitHub Pages</a>
                                </p>
                            `;
                            document.getElementById('content').innerHTML = originalHTML;
                            
                            const savedLang = localStorage.getItem('language');
                            if (savedLang === 'english') {
                                setTimeout(() => {
                                    translateContent();
                                }, 300);
                            }
                        })
                        .catch(finalError => {
                            document.getElementById('content').innerHTML = `
                                <div class="error">
                                    <h2>❌ Error Loading File</h2>
                                    <p><strong>${finalError.message}</strong></p>
                                    <p><strong>File path:</strong> <code>${file}</code></p>
                                    <hr>
                                    <p><strong>💡 Try these links:</strong></p>
                                    <p>
                                        <a href="${rawUrl}" target="_blank">📄 View Raw on GitHub</a><br>
                                        <a href="https://github.com/${GITHUB_USER}/${GITHUB_REPO}/blob/${BRANCH}/${file}" target="_blank">📖 View on GitHub</a>
                                    </p>
                                </div>
                            `;
                        });
                });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>📄 Markdown Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ── CSS Variables for Dark/Light Mode ── */
        :root {
            --bg-body: #f5f7fb;
            --bg-container: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a5a6e;
            --border-color: #e8ecf4;
            --code-bg: #f0f4fe;
            --pre-bg: #1a1a2e;
            --pre-text: #e8ecf4;
            --blockquote-border: #4a00e0;
            --table-header: #f0f4fe;
            --table-border: #dce2ec;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --link-color: #4a00e0;
            --btn-bg: #4a00e0;
            --btn-hover: #3a00b0;
            --error-bg: #ffe8e8;
            --error-text: #d63031;
            --loading-color: #5a6a7e;
            --success-color: #0a7a3a;
        }

        [data-theme="dark"] {
            --bg-body: #0d1117;
            --bg-container: #161b22;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --code-bg: #1c2333;
            --pre-bg: #0d1117;
            --pre-text: #e6edf3;
            --blockquote-border: #58a6ff;
            --table-header: #21262d;
            --table-border: #30363d;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --link-color: #58a6ff;
            --btn-bg: #238636;
            --btn-hover: #2ea043;
            --error-bg: #2d1b1e;
            --error-text: #f85149;
            --loading-color: #8b949e;
            --success-color: #3fb950;
        }

        /* ── Base Styles ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.7;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            background: var(--bg-container);
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        /* ── Header ── */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
        }

        .back-btn {
            display: inline-block;
            background: var(--btn-bg);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }
        .back-btn:hover { background: var(--btn-hover); text-decoration: none; }

        .dark-toggle {
            background: var(--border-color);
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-primary);
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dark-toggle:hover { background: var(--table-header); }

        /* ── CONTENT STYLES — FIXED LAYOUT & GAPS ── */
        #content {
            min-height: 300px;
        }

        /* Headings */
        #content h1, #content h2, #content h3, #content h4, #content h5, #content h6 {
            color: var(--text-primary);
            margin-top: 1.8em;
            margin-bottom: 0.6em;
            line-height: 1.3;
        }
        #content h1 { font-size: 2.2em; border-bottom: 3px solid var(--blockquote-border); padding-bottom: 10px; margin-top: 0; }
        #content h2 { font-size: 1.8em; border-bottom: 2px solid var(--border-color); padding-bottom: 8px; }
        #content h3 { font-size: 1.4em; }
        #content h4 { font-size: 1.2em; }
        #content h5, #content h6 { font-size: 1.1em; }

        /* Paragraphs — GAP FIXED */
        #content p {
            color: var(--text-primary);
            margin-bottom: 1.2em;  /* ← এখানে Gap যোগ করা হয়েছে */
            line-height: 1.8;
        }

        /* Lists */
        #content ul, #content ol {
            margin: 0.8em 0 1.2em 1.8em;
            padding-left: 0.5em;
        }
        #content li {
            margin-bottom: 0.3em;
            line-height: 1.7;
        }
        #content li:last-child {
            margin-bottom: 0;
        }

        /* Code */
        #content code {
            background: var(--code-bg);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.9em;
            color: var(--text-primary);
        }
        #content pre {
            background: var(--pre-bg);
            color: var(--pre-text);
            padding: 16px 20px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 1.2em 0;
        }
        #content pre code {
            background: transparent;
            padding: 0;
        }

        /* Blockquote */
        #content blockquote {
            border-left: 4px solid var(--blockquote-border);
            margin: 1.2em 0;
            padding-left: 20px;
            color: var(--text-secondary);
        }

        /* Tables — ALIGNMENT FIXED */
        #content table {
            border-collapse: collapse;
            width: 100%;
            margin: 1.2em 0;
        }
        #content th, #content td {
            border: 1px solid var(--table-border);
            padding: 10px 14px;
            text-align: left;
            vertical-align: top;
        }
        #content th {
            background: var(--table-header);
            color: var(--text-primary);
            font-weight: 600;
        }
        #content td {
            color: var(--text-primary);
        }

        /* Links */
        #content a {
            color: var(--link-color);
            text-decoration: none;
        }
        #content a:hover { text-decoration: underline; }

        /* Horizontal Rule */
        #content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 1.8em 0;
        }

        /* Images */
        #content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1em 0;
        }

        /* ── Utility ── */
        .loading {
            text-align: center;
            padding: 40px 0;
            color: var(--loading-color);
        }

        .error {
            color: var(--error-text);
            background: var(--error-bg);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--error-text);
        }
        .error code { background: var(--bg-container); }

        .success { color: var(--success-color); }

        .footer-info {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 20px;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            body { padding: 10px; margin: 10px auto; }
            .container { padding: 20px; }
            .header-bar { flex-direction: column; align-items: stretch; }
            .dark-toggle { justify-content: center; }
            #content table { font-size: 0.85rem; }
            #content th, #content td { padding: 6px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <a href="index.html" class="back-btn">⬅ Back to Course</a>
            <button class="dark-toggle" id="darkToggle" onclick="toggleDarkMode()">
                🌙 Dark Mode
            </button>
        </div>

        <div id="content">
            <div class="loading">📖 Loading document...</div>
        </div>
    </div>

    <script>
        // ── Dark Mode ──
        function toggleDarkMode() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const btn = document.getElementById('darkToggle');
            
            if (current === 'dark') {
                html.removeAttribute('data-theme');
                btn.innerHTML = '🌙 Dark Mode';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                btn.innerHTML = '☀️ Light Mode';
                localStorage.setItem('theme', 'dark');
            }
        }

        (function loadTheme() {
            const saved = localStorage.getItem('theme');
            const btn = document.getElementById('darkToggle');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                if (btn) btn.innerHTML = '☀️ Light Mode';
            }
        })();

        // ── Markdown Loader ──
        const params = new URLSearchParams(window.location.search);
        let file = params.get('file');

        if (!file) {
            document.getElementById('content').innerHTML = `
                <h2>❌ No file specified</h2>
                <p>Please use: <code>?file=path/to/file.md</code></p>
            `;
        } else {
            file = file.replace(/^\//, '');
            
            const GITHUB_USER = 'trytolearncyber';
            const GITHUB_REPO = 'macban';
            const BRANCH = 'main';
            
            const rawUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${file}`;
            const pagesUrl = window.location.origin + '/' + file;
            
            console.log('Fetching from:', rawUrl);
            
            fetch(rawUrl)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.text();
                })
                .then(markdown => {
                    if (markdown.trim().startsWith('<!DOCTYPE') || markdown.trim().startsWith('<html')) {
                        throw new Error('File appears to be HTML, not markdown');
                    }
                    document.getElementById('content').innerHTML = marked.parse(markdown);
                    document.getElementById('content').innerHTML += `
                        <hr>
                        <p class="footer-info">
                            ✅ Loaded from: <a href="${rawUrl}" target="_blank">GitHub Raw</a>
                        </p>
                    `;
                })
                .catch(error => {
                    console.log('Raw failed, trying Pages:', pagesUrl);
                    fetch(pagesUrl)
                        .then(response => {
                            if (!response.ok) throw new Error(`HTTP ${response.status}`);
                            return response.text();
                        })
                        .then(markdown => {
                            if (markdown.trim().startsWith('<!DOCTYPE') || markdown.trim().startsWith('<html')) {
                                throw new Error('File appears to be HTML, not markdown');
                            }
                            document.getElementById('content').innerHTML = marked.parse(markdown);
                            document.getElementById('content').innerHTML += `
                                <hr>
                                <p class="footer-info">
                                    ✅ Loaded from: <a href="${pagesUrl}" target="_blank">GitHub Pages</a>
                                </p>
                            `;
                        })
                        .catch(finalError => {
                            document.getElementById('content').innerHTML = `
                                <div class="error">
                                    <h2>❌ Error Loading File</h2>
                                    <p><strong>${finalError.message}</strong></p>
                                    <p><strong>File path:</strong> <code>${file}</code></p>
                                    <hr>
                                    <p><strong>💡 Try these links:</strong></p>
                                    <p>
                                        <a href="${rawUrl}" target="_blank">📄 View Raw on GitHub</a><br>
                                        <a href="https://github.com/${GITHUB_USER}/${GITHUB_REPO}/blob/${BRANCH}/${file}" target="_blank">📖 View on GitHub</a>
                                    </p>
                                </div>
                            `;
                        });
                });
        }
    </script>
</body>
</html>
